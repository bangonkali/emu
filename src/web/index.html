<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pokemon Blue Debug Console</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <div>
                <p class="eyebrow">Headless Runtime</p>
                <h1>Pokemon Blue Debug Console</h1>
            </div>
            <div class="topbar-meta">
                <div class="status-row">
                    <span id="connection-indicator" class="status offline">Disconnected</span>
                    <span id="frame-count" class="mono">Frame: 0</span>
                </div>
                <div class="speed-controls" aria-label="Emulation Speed">
                    <button type="button" data-speed="1x" class="speed-button active">1x</button>
                    <button type="button" data-speed="2x" class="speed-button">2x</button>
                    <button type="button" data-speed="4x" class="speed-button">4x</button>
                    <button type="button" data-speed="8x" class="speed-button">8x</button>
                    <button type="button" data-speed="10x" class="speed-button">10x</button>
                    <button type="button" data-speed="max" class="speed-button">MAX</button>
                </div>
            </div>
        </header>

        <main class="main-grid">
            <section class="panel screen-panel">
                <div class="screen-frame">
                    <img id="screen" alt="Live Game Boy screen" src="" width="160" height="144">
                </div>
                <div class="controls-grid">
                    <div class="dpad" aria-label="Directional Pad">
                        <button type="button" data-btn="up" class="dpad-button up">Up</button>
                        <button type="button" data-btn="left" class="dpad-button left">Left</button>
                        <button type="button" data-btn="right" class="dpad-button right">Right</button>
                        <button type="button" data-btn="down" class="dpad-button down">Down</button>
                    </div>
                    <div class="face-controls">
                        <button type="button" data-btn="a" class="face-button a">A</button>
                        <button type="button" data-btn="b" class="face-button b">B</button>
                        <div class="menu-buttons">
                            <button type="button" data-btn="select" class="menu-button">Select</button>
                            <button type="button" data-btn="start" class="menu-button">Start</button>
                        </div>
                    </div>
                </div>
                <p class="hint mono">Keyboard: Arrows, Z, X, Enter, Shift</p>
            </section>

            <section class="panel map-panel">
                <div class="panel-heading">
                    <h2>Kanto Map</h2>
                    <span id="map-name" class="mono">Unknown</span>
                </div>
                <canvas id="world-map" width="560" height="560"></canvas>
                <div class="stats-grid mono">
                    <div class="stat-card">
                        <span class="label">Bot State</span>
                        <span id="bot-state">BOOTING</span>
                    </div>
                    <div class="stat-card">
                        <span class="label">Coords</span>
                        <span id="coords">X:0 Y:0</span>
                    </div>
                    <div class="stat-card">
                        <span class="label">Party</span>
                        <span id="party">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="label">Badges</span>
                        <span id="badges">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="label">Money</span>
                        <span id="money">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="label">Lead HP</span>
                        <span id="lead-hp">0 / 0</span>
                    </div>
                </div>
            </section>
        </main>

        <section class="panel log-panel">
            <div class="panel-heading">
                <h2>Runtime Logs</h2>
                <span class="mono">Cap: 400 rows</span>
            </div>
            <div id="log-output" class="log-output" aria-live="polite"></div>
        </section>
    </div>

    <script src="/app.js"></script>
</body>
</html>
